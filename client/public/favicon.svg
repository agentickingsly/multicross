<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White grid background -->
  <rect x="1" y="1" width="30" height="30" fill="#ffffff"/>

  <!-- Black squares: corners (0,0)(0,4)(4,0)(4,4) + center column rows 1,3 (1,2)(3,2) -->
  <rect x="1"  y="1"  width="6" height="6" fill="#1e3a5f"/>
  <rect x="25" y="1"  width="6" height="6" fill="#1e3a5f"/>
  <rect x="13" y="7"  width="6" height="6" fill="#1e3a5f"/>
  <rect x="13" y="19" width="6" height="6" fill="#1e3a5f"/>
  <rect x="1"  y="25" width="6" height="6" fill="#1e3a5f"/>
  <rect x="25" y="25" width="6" height="6" fill="#1e3a5f"/>

  <!-- Interior grid lines -->
  <path d="M7,1 L7,31 M13,1 L13,31 M19,1 L19,31 M25,1 L25,31
           M1,7 L31,7 M1,13 L31,13 M1,19 L31,19 M1,25 L31,25"
        stroke="#1e3a5f" stroke-width="0.5" fill="none"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="31" height="31" fill="none" stroke="#1e3a5f" stroke-width="1"/>
</svg>
