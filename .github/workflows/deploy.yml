# Required GitHub Secrets (Settings → Secrets and variables → Actions):
# VPS_HOST        — your VPS IP address or domain (e.g. 192.168.1.1)
# VPS_USER        — SSH username on the VPS (e.g. root or ubuntu)
# VPS_SSH_KEY     — contents of your private SSH key (~/.ssh/id_ed25519)
# VPS_DEPLOY_PATH — absolute path to repo on VPS (e.g. /var/www/multicross)

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            bash deploy.sh
